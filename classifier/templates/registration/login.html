<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Brain Tumor AI Classifier</title>
    <link rel="stylesheet" href="/static/classifier/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-card {
            max-width: 450px;
            margin: 4rem auto;
            padding: 3rem;
            text-align: center;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
            text-align: left;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.8rem 1rem;
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(14, 165, 233, 0.05);
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
        }

        .auth-links {
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-links a:hover {
            color: #fff;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-md);
        }
    </style>
</head>

<body>
    <div class="background-animation">
        <div class="particles"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <div class="auth-card upload-card">
            <div class="logo">
                <i class="fas fa-brain"></i>
            </div>
            <h2>Welcome Back</h2>
            <p class="tagline">Medical AI Access</p>

            {% if form.errors %}
            <div class="error-message">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post" class="auth-form" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username"
                        maxlength="150" required id="id_username">
                </div>
                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" autocomplete="current-password" required id="id_password">
                </div>
                <input type="hidden" name="next" value="{{ next|default:'/' }}">

                <button type="submit" class="predict-btn" style="width: 100%; margin-top: 1rem;">
                    Log In
                </button>
            </form>

            <div class="auth-links">
                Don't have an account? <a href="{% url 'register' %}">Create one</a>
            </div>
        </div>
    </div>
</body>

</html>
